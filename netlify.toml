# Netlify deployment configuration for Nabha Telemedicine Platform
[build]
  publish = "build"
  command = "npm run build"

# Build environment variables
[build.environment]
  REACT_APP_ENVIRONMENT = "production"
  REACT_APP_VERSION = "1.0.0"
  NODE_VERSION = "18"
  NPM_VERSION = "8"

# React Router SPA support - Critical for direct URL navigation
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = false

# API redirects (for future backend integration)
[[redirects]]
  from = "/api/*"
  to = "https://your-backend-api.com/api/:splat"
  status = 200
  force = false
  headers = {X-From = "Netlify"}

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https:;"

# Cache static assets
[[headers]]
  for = "/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Cache service worker
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache"

# PWA manifest
[[headers]]
  for = "/manifest.json"
  [headers.values]
    Content-Type = "application/manifest+json"

# Error page redirects
[[redirects]]
  from = "/404"
  to = "/index.html"
  status = 200

# Health check endpoint
[[redirects]]
  from = "/health"
  to = "/index.html"
  status = 200

# Language-specific redirects (future enhancement)
[[redirects]]
  from = "/hi/*"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/pa/*" 
  to = "/index.html"
  status = 200

# Netlify functions (for future serverless functions)
[functions]
  directory = "netlify/functions"

# Form handling (for future contact forms)
[build.processing]
  skip_processing = false
[build.processing.css]
  bundle = true
  minify = true
[build.processing.js]
  bundle = true
  minify = true
[build.processing.html]
  pretty_urls = true

# Plugin configuration
[[plugins]]
  package = "@netlify/plugin-lighthouse"
  
  [plugins.inputs]
  output_path = "reports/lighthouse.html"

# Development server settings
[dev]
  command = "npm start"
  port = 3000
  targetPort = 3000
  publish = "build"
  autoLaunch = true