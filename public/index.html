    /* Critical CSS for initial load performance */
    * {

      line-height: 1.5;

    /* Loading Spinner Styles */
    .loading-spinner {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #3B82F6, #1D4ED8);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      opacity: 1;
      transition: opacity 0.3s ease;
    }
    
    .loading-spinner.hidden {
      opacity: 0;
      pointer-events: none;
    }
    
    .spinner {
      width: 60px;
      height: 60px;
      border: 4px solid rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      border-top-color: white;
      animation: spin 1s ease-in-out infinite;
    }
    
    .loading-text {
      color: white;
      margin-top: 20px;
      font-size: 18px;
      font-weight: 500;
      text-align: center;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    /* No-script fallback styles */
    .noscript-message {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #FEF2F2;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      z-index: 10000;
      padding: 20px;
      text-align: center;
    }
    
    .noscript-message h1 {
      color: #DC2626;
      font-size: 24px;
      margin-bottom: 16px;
    }
    
    .noscript-message p {
      color: #7F1D1D;
      font-size: 16px;
      line-height: 1.6;
      max-width: 500px;
    }
    
    /* Accessibility improvements */
    @media (prefers-reduced-motion: reduce) {
      .spinner {
        animation: none;
      }
      
      html {
        scroll-behavior: auto;
      }
    }
    
    /* High contrast mode support */
    @media (prefers-contrast: high) {
      body {
        background-color: white;
        color: black;
      }
    }
    
    /* Dark mode support */
    @media (prefers-color-scheme: dark) {
      body {
        background-color: #111827;
        color: #F9FAFB;
      }
    }
    
    /* Focus styles for accessibility */
    *:focus {
      outline: 2px solid #3B82F6;
      outline-offset: 2px;
    }
    
    /* Print styles */
    @media print {
      .loading-spinner {
        display: none !important;
      }
    }

  <!-- Service Worker Registration -->
  <script>
    // Service Worker Registration for PWA functionality
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .then((registration) => {
            console.log('SW registered: ', registration);
            
            // Check for updates
            registration.addEventListener('updatefound', () => {
              const newWorker = registration.installing;
              newWorker.addEventListener('statechange', () => {
                if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                  // New update available
                  if (confirm('New version available! Reload to update?')) {
                    window.location.reload();
                  }
                }
              });
            });
          })
          .catch((registrationError) => {
            console.log('SW registration failed: ', registrationError);
          });
      });
    }

    // Hide loading spinner when app loads
    window.addEventListener('DOMContentLoaded', () => {
      setTimeout(() => {
        const spinner = document.getElementById('loading-spinner');
        if (spinner) {
          spinner.classList.add('hidden');
          setTimeout(() => spinner.style.display = 'none', 300);
        }
      }, 1000);
    });

    // Online/Offline Status Management
    function updateOnlineStatus() {
      const offlineMessage = document.getElementById('offline-message');
      if (navigator.onLine) {
        offlineMessage.style.display = 'none';
      } else {
        offlineMessage.style.display = 'block';
      }
    }

    window.addEventListener('online', updateOnlineStatus);
    window.addEventListener('offline', updateOnlineStatus);
    
    // Check initial status
    document.addEventListener('DOMContentLoaded', updateOnlineStatus);

    // Performance monitoring
    window.addEventListener('load', () => {
      // Log performance metrics
      if ('performance' in window) {
        const perfData = performance.getEntriesByType('navigation')[0];
        console.log('Page Load Time:', perfData.loadEventEnd - perfData.loadEventStart, 'ms');
        console.log('DOM Content Loaded:', perfData.domContentLoadedEventEnd - perfData.domContentLoadedEventStart, 'ms');
      }
    });

    // Error boundary for unhandled JavaScript errors
    window.addEventListener('error', (event) => {
      console.error('Global error:', event.error);
      // In production, you might want to send this to an error tracking service
    });

    // Promise rejection handler
    window.addEventListener('unhandledrejection', (event) => {
      console.error('Unhandled promise rejection:', event.reason);
      event.preventDefault();
    });
  </script>

  <!-- Analytics (Privacy-compliant, no cookies) -->
  <script>
    // Simple analytics without cookies or personal data
    if (navigator.sendBeacon && document.referrer !== window.location.href) {
      const analyticsData = JSON.stringify({
        page: window.location.pathname,
        timestamp: new Date().toISOString(),
        userAgent: navigator.userAgent.substring(0, 100), // Truncated for privacy
        language: navigator.language,
        online: navigator.onLine
      });
      
      // Only send if user hasn't opted out
      if (!localStorage.getItem('analytics-opt-out')) {
        navigator.sendBeacon('/api/analytics', analyticsData);
      }
    }
  </script>
