<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#1D4ED8" />
    <meta name="description" content="eSEHAT Nabha — AI-powered multilingual offline-first rural healthcare platform. Connecting 173 villages in Nabha, Punjab." />
    <meta name="keywords" content="telemedicine, rural healthcare, Punjab, Nabha, offline, AI, ASHA, healthcare" />
    <meta name="author" content="Punjab Health Department" />

    <!-- Open Graph -->
    <meta property="og:title" content="eSEHAT Nabha — Rural Healthcare Platform" />
    <meta property="og:description" content="AI-powered, multilingual, offline-first healthcare for 173 villages in Nabha, Punjab." />
    <meta property="og:type" content="website" />

    <!-- PWA -->
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="eSEHAT" />

    <!-- Preconnect for Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

    <title>eSEHAT Nabha — Rural Healthcare Platform</title>

    <style>
      /* Critical above-fold CSS to prevent FOUC */
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html, body { height: 100%; font-family: 'Inter', -apple-system, sans-serif; }
      #root { min-height: 100%; }
      #loading-screen {
        position: fixed; inset: 0;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        background: linear-gradient(135deg, #1e3a8a 0%, #1d4ed8 50%, #0d9488 100%);
        z-index: 9999; gap: 16px;
        transition: opacity 0.4s ease;
      }
      #loading-screen.hidden { opacity: 0; pointer-events: none; }
      .loading-icon { font-size: 56px; animation: bounce 1s ease infinite alternate; }
      .loading-title { color: white; font-size: 24px; font-weight: 700; letter-spacing: -0.5px; }
      .loading-sub { color: rgba(255,255,255,0.7); font-size: 13px; }
      .loading-bar { width: 180px; height: 3px; background: rgba(255,255,255,0.2); border-radius: 99px; overflow: hidden; }
      .loading-bar-fill { height: 100%; background: white; border-radius: 99px; animation: load 1.8s ease forwards; }
      @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-8px); } }
      @keyframes load { from { width: 0%; } to { width: 100%; } }
    </style>
  </head>
  <body>
    <noscript>
      <div style="padding:40px;text-align:center;font-family:sans-serif;">
        <h2>🏥 eSEHAT Nabha</h2>
        <p>Please enable JavaScript to use this healthcare platform.</p>
        <p>ਇਸ ਸਿਹਤ ਪਲੇਟਫਾਰਮ ਦੀ ਵਰਤੋਂ ਕਰਨ ਲਈ JavaScript ਚਾਲੂ ਕਰੋ।</p>
      </div>
    </noscript>

    <!-- Splash Screen -->
    <div id="loading-screen">
      <div class="loading-icon">🏥</div>
      <div class="loading-title">eSEHAT Nabha</div>
      <div class="loading-sub">Rural Healthcare Platform • Punjab</div>
      <div class="loading-bar"><div class="loading-bar-fill"></div></div>
    </div>

    <div id="root"></div>

    <script>
      // Hide splash screen when React app mounts
      window.addEventListener('load', () => {
        setTimeout(() => {
          const splash = document.getElementById('loading-screen');
          if (splash) { splash.classList.add('hidden'); setTimeout(() => splash.remove(), 400); }
        }, 800);
      });
    </script>
  </body>
</html>
